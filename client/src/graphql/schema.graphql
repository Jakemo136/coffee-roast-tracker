scalar DateTime

scalar JSON

enum TempUnit {
  CELSIUS
  FAHRENHEIT
}

enum FileType {
  KLOG
  CSV
}

enum ProfileType {
  KAFFELOGIC
}

type User {
  id: ID!
  clerkId: String!
  tempUnit: TempUnit!
  userBeans: [UserBean!]!
  roasts: [Roast!]!
  createdAt: DateTime!
}

type Bean {
  id: ID!
  name: String!
  origin: String
  process: String
  cropYear: Int
  roasts: [Roast!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type UserBean {
  id: ID!
  notes: String
  shortName: String
  bean: Bean!
  createdAt: DateTime!
}

type Roast {
  id: ID!
  ambientTemp: Float
  roastingLevel: Float
  tastingNotes: String
  colourChangeTime: Float
  firstCrackTime: Float
  roastEndTime: Float
  colourChangeTemp: Float
  firstCrackTemp: Float
  roastEndTemp: Float
  developmentTime: Float
  developmentPercent: Float
  totalDuration: Float
  roastDate: DateTime
  timeSeriesData: JSON
  roastProfileCurve: JSON
  fanProfileCurve: JSON
  notes: String
  isShared: Boolean!
  shareToken: String!
  bean: Bean!
  roastFiles: [RoastFile!]!
  roastProfile: RoastProfile
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RoastFile {
  id: ID!
  fileKey: String!
  fileName: String!
  fileType: FileType!
  createdAt: DateTime!
}

type RoastProfile {
  id: ID!
  fileKey: String!
  fileName: String!
  profileType: ProfileType!
  profileShortName: String
  profileDesigner: String
  createdAt: DateTime!
}

type UploadRoastResult {
  roast: Roast!
  parseWarnings: [String!]!
}

type RoastLogPreview {
  roastDate: DateTime
  ambientTemp: Float
  roastingLevel: Float
  tastingNotes: String
  profileShortName: String
  profileDesigner: String
  colourChangeTime: Float
  firstCrackTime: Float
  roastEndTime: Float
  developmentPercent: Float
  totalDuration: Float
  suggestedBean: UserBean
  parseWarnings: [String!]!
}

type ProfileDownload {
  fileName: String!
  content: String!
}

input CreateBeanInput {
  name: String!
  origin: String
  process: String
  cropYear: Int
  notes: String
  shortName: String
}

input CreateRoastInput {
  beanId: String!
  ambientTemp: Float
  roastingLevel: Float
  tastingNotes: String
  colourChangeTime: Float
  firstCrackTime: Float
  roastEndTime: Float
  colourChangeTemp: Float
  firstCrackTemp: Float
  roastEndTemp: Float
  developmentTime: Float
  developmentPercent: Float
  totalDuration: Float
  roastDate: DateTime
  timeSeriesData: JSON
  roastProfileCurve: JSON
  fanProfileCurve: JSON
  notes: String
}

input UpdateRoastInput {
  ambientTemp: Float
  roastingLevel: Float
  tastingNotes: String
  colourChangeTime: Float
  firstCrackTime: Float
  roastEndTime: Float
  colourChangeTemp: Float
  firstCrackTemp: Float
  roastEndTemp: Float
  developmentTime: Float
  developmentPercent: Float
  totalDuration: Float
  roastDate: DateTime
  timeSeriesData: JSON
  roastProfileCurve: JSON
  fanProfileCurve: JSON
  notes: String
}

input UploadRoastProfileInput {
  roastId: String!
  fileKey: String!
  fileName: String!
  profileType: ProfileType
}

type Query {
  previewRoastLog(fileName: String!, fileContent: String!): RoastLogPreview!
  downloadProfile(roastId: String!): ProfileDownload
  myBeans: [UserBean!]!
  myRoasts: [Roast!]!
  roastById(id: String!): Roast
  roastsByBean(beanId: String!): [Roast!]!
  roastsByIds(ids: [String!]!): [Roast!]!
  roastByShareToken(token: String!): Roast
}

type Mutation {
  createBean(input: CreateBeanInput!): UserBean!
  addBeanToLibrary(beanId: String!, notes: String, shortName: String): UserBean!
  updateUserBean(id: String!, notes: String, shortName: String): UserBean!
  removeBeanFromLibrary(beanId: String!): Boolean!
  createRoast(input: CreateRoastInput!): Roast!
  updateRoast(id: String!, input: UpdateRoastInput!): Roast!
  deleteRoast(id: String!): Boolean!
  toggleRoastSharing(id: String!): Roast!
  uploadRoastProfile(input: UploadRoastProfileInput!): RoastProfile!
  uploadRoastLog(beanId: String!, fileName: String!, fileContent: String!): UploadRoastResult!
  updateTempUnit(tempUnit: TempUnit!): User!
}