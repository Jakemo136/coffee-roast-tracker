name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npm run build

      - run: npm test

  server:
    name: Server
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coffee_roast_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coffee_roast_tracker_test
      PRISMA_USER_CONSENT_FOR_DANGEROUS_AI_ACTION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        working-directory: .

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run build

      - run: npm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [client, server]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coffee_roast_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/coffee_roast_tracker_test
      CLERK_SECRET_KEY: sk_test_placeholder
      VITE_E2E_TEST: "true"
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      PRISMA_USER_CONSENT_FOR_DANGEROUS_AI_ACTION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Migrate and seed test database
        working-directory: server
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed

      - name: Resolve test user ID
        id: test-user
        run: |
          USER_ID=$(PGPASSWORD=postgres psql -h localhost -U postgres -d coffee_roast_tracker_test -tAc "SELECT id FROM \"User\" WHERE \"clerkId\" = 'clerk_seed_alice_001'")
          echo "id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Start servers
        run: |
          E2E_TEST_USER_ID=${{ steps.test-user.outputs.id }} npm run dev:server &
          npm run dev:client &
          npx wait-on tcp:4000 http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --reporter=list

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
